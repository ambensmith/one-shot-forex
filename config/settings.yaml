scheduler:
  interval: "1h"
  timezone: "UTC"

risk:
  max_risk_per_trade: 0.01
  max_open_positions_per_stream: 5
  max_daily_loss_per_stream: 0.03
  max_correlated_positions: 2
  default_rr_ratio: 2.0          # 2:1 reward-to-risk ratio
  stop_loss_method: "atr"
  atr_multiplier: 1.5
  atr_period: 14
  leverage: 0                     # no leverage — demo/testing mode
  fixed_position_size: 1000       # Capital.com minimum (0.01 lots = 1000 units)

execution:
  mode: "practice"
  data_provider: "capitalcom"  # capitalcom | offline

data:
  candle_granularity: "H1"
  lookback_periods: 200
  secondary_granularity: "D"

finnhub:
  api_key_env: "FINNHUB_API_KEY"
  base_url: "https://finnhub.io/api/v1"

bias:
  decay_hours: 12          # drop contributing signals older than this
  cooldown_hours: 2        # hours to wait after bias flip before trading new direction

reviews:
  auto_generate: true
  schedule: "daily"
  time: "22:00"
  review_period_days: 7
  max_archive_count: 30
  output_dir: "reviews"
