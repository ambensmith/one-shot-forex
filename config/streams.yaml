news_stream:
  id: "news"
  name: "News Stream"
  enabled: true
  capital_allocation: 100
  instruments:
    - EUR_USD
    - GBP_USD
    - USD_JPY
    - USD_CHF
    - AUD_USD
    - USD_CAD
    - EUR_GBP
    - XAU_USD
  news_sources:
    # Primary API source
    - type: "finnhub"
      name: "Finnhub News"
      enabled: true
    - type: "finnhub_calendar"
      name: "Finnhub Calendar"
      enabled: true
    # Major business news RSS
    - type: "rss"
      url: "https://feeds.bbci.co.uk/news/business/rss.xml"
      name: "BBC Business"
    - type: "rss"
      url: "https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=10000664"
      name: "CNBC Business"
    # Central bank RSS feeds
    - type: "rss"
      url: "https://www.ecb.europa.eu/rss/press.html"
      name: "ECB"
      category: "central_bank"
    - type: "rss"
      url: "https://www.federalreserve.gov/feeds/press_all.xml"
      name: "Fed"
      category: "central_bank"
    - type: "rss"
      url: "https://www.bankofengland.co.uk/rss/publications"
      name: "BoE"
      category: "central_bank"
    - type: "rss"
      url: "https://www.boj.or.jp/en/rss/whatsnew.xml"
      name: "BoJ"
      category: "central_bank"
    - type: "rss"
      url: "https://www.snb.ch/public/en/rss/pressrel"
      name: "SNB"
      category: "central_bank"
    - type: "rss"
      url: "https://www.rba.gov.au/rss/rss-cb-media-releases.xml"
      name: "RBA"
      category: "central_bank"
    - type: "rss"
      url: "https://www.bankofcanada.ca/feed/"
      name: "BoC"
      category: "central_bank"
  news_lookback_hours: 4
  dedup_threshold: 0.80
  min_confidence: 0.60
  llm:
    relevance_model: "groq/llama-3.1-8b"
    signal_model: "groq/llama-4-scout"
    comparison_models: []
    comparison_enabled: false

strategy_stream:
  id: "strategy"
  name: "Strategy Stream"
  enabled: true
  capital_allocation: 100
  instruments:
    - EUR_USD
    - GBP_USD
    - USD_JPY
    - USD_CHF
    - AUD_USD
    - USD_CAD
    - EUR_GBP
    - XAU_USD
  strategies:
    - name: "momentum"
      enabled: true
      params:
        lookback_months: 12
        rebalance_frequency: "weekly"
    - name: "carry"
      enabled: true
      params:
        rate_data: "manual"
    - name: "breakout"
      enabled: true
      params:
        asian_start: "22:00"
        asian_end: "06:00"
        breakout_buffer_pips: 10
    - name: "mean_reversion"
      enabled: true
      params:
        bb_period: 20
        bb_std: 2.0
        rsi_period: 14
        rsi_oversold: 30
        rsi_overbought: 70
    - name: "volatility_breakout"
      enabled: true
      params:
        atr_period: 14
        atr_contraction_threshold: 0.7
        breakout_atr_multiplier: 1.0

hybrid_defaults:
  capital_allocation: 100
  min_confidence: 0.60
