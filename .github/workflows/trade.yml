name: Trading Cycle
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'tick'
        type: choice
        options:
          - tick
          - reset
          - review
          - save-hybrid
          - save-config
          - get-config
          - fix-phantoms
      stream:
        description: 'Which stream to run (tick mode only)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - news
          - strategy
          - hybrid
      force_market_open:
        description: 'Bypass market hours check'
        required: false
        default: 'true'
        type: boolean
      hybrid_json:
        description: 'Hybrid config JSON (save-hybrid mode only)'
        required: false
        type: string
      review_period:
        description: 'Review period (review mode only)'
        required: false
        default: '7d'
        type: string
      config_json:
        description: 'Config overrides JSON (save-config mode only)'
        required: false
        type: string

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading cycle
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CAPITALCOM_API_KEY: ${{ secrets.CAPITALCOM_API_KEY }}
          CAPITALCOM_EMAIL: ${{ secrets.CAPITALCOM_EMAIL }}
          CAPITALCOM_PASSWORD: ${{ secrets.CAPITALCOM_PASSWORD }}
        run: |
          MODE="${{ github.event.inputs.mode || 'tick' }}"
          STREAM="${{ github.event.inputs.stream || 'all' }}"
          FORCE="${{ github.event.inputs.force_market_open }}"
          HYBRID_JSON='${{ github.event.inputs.hybrid_json }}'
          PERIOD="${{ github.event.inputs.review_period || '7d' }}"

          if [ "$MODE" = "tick" ]; then
            CMD="python -m backend.main --mode tick --stream $STREAM"
            if [ "$FORCE" = "true" ]; then
              CMD="$CMD --force-market-open"
            fi
            $CMD
          elif [ "$MODE" = "reset" ]; then
            python -m backend.main --mode reset
          elif [ "$MODE" = "review" ]; then
            python -m backend.main --mode review --period "$PERIOD"
          elif [ "$MODE" = "save-hybrid" ]; then
            python -m backend.main --mode save-hybrid --hybrid-json "$HYBRID_JSON"
          elif [ "$MODE" = "save-config" ]; then
            CONFIG_JSON='${{ github.event.inputs.config_json }}'
            python -m backend.main --mode save-config --config-json "$CONFIG_JSON"
          elif [ "$MODE" = "get-config" ]; then
            python -m backend.main --mode get-config
          elif [ "$MODE" = "fix-phantoms" ]; then
            python -m backend.main --mode fix-phantoms
          fi

      - name: Export dashboard JSON
        run: python -m backend.dashboard.json_exporter

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ logs/ reviews/ frontend/public/data/
          git diff --staged --quiet || git commit -m "cycle $(date -u +%Y-%m-%dT%H:%M) [${{ github.event.inputs.mode || 'tick' }}]"
          git pull --rebase origin main
          git push
