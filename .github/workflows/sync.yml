name: Position Sync
on:
  schedule:
    - cron: '*/5 * * * 1-4'    # Mon–Thu: every 5 min
    - cron: '*/5 0-21 * * 5'   # Friday: every 5 min until 21:55
    - cron: '*/5 22-23 * * 0'  # Sunday: every 5 min from 22:00
  workflow_dispatch:

concurrency:
  group: position-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run position sync
        env:
          CAPITALCOM_API_KEY: ${{ secrets.CAPITALCOM_API_KEY }}
          CAPITALCOM_EMAIL: ${{ secrets.CAPITALCOM_EMAIL }}
          CAPITALCOM_PASSWORD: ${{ secrets.CAPITALCOM_PASSWORD }}
        run: python -m backend.sync

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ logs/ frontend/public/data/
          git diff --staged --quiet || git commit -m "sync $(date -u +%Y-%m-%dT%H:%M)"
          git pull --rebase origin main
          git push
